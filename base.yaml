# 2. Reference the common settings using an Alias (*)
twe-agg01:
  <<: *common                # This "pulls in" everything from common_settings
  name: "TWE-AGG01"          # NOTE this is in UPPERCASE as it is applied to the switch hostname
  url: "https://192.168.1.87"


twe-agg02:
  <<: *common                # Same here
  name: "TWE-AGG02"          # NOTE this is in UPPERCASE as it is applied to the switch hostname
